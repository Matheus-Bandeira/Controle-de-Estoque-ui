<h2 class="mb-4">Lista de Categorias</h2>

<!-- Filtros -->
<form [formGroup]="filtroForm" class="mb-3">
  <div class="row g-3">
    <div class="col-md-4">
      <label for="nome" class="form-label">Nome:</label>
      <input
        id="nome"
        type="text"
        class="form-control"
        formControlName="nome"
        placeholder="Filtrar por nome"
      />
    </div>
  </div>
</form>

<!-- Tabela -->
<table class="table table-bordered table-striped table-hover mt-4">
  <thead class="table-dark">
    <tr>
      <th class="id-col">ID</th>
      <th class="nome">Nome</th>
      <th class="text-end acoes">Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let categoria of categoriasFiltradas">
      <td class="id-col">{{ categoria.id }}</td>
      <td class="nome text-truncate" title="{{ categoria.nome }}">{{ categoria.nome }}</td>
      <td class="text-end acoes">
        <div class="d-inline-flex gap-1 justify-content-end">
          <button class="btn btn-primary btn-sm" (click)="editar(categoria)">Editar</button>
          <button class="btn btn-danger btn-sm" (click)="excluir(categoria)">Excluir</button>
        </div>
      </td>
    </tr>
  </tbody>
</table>

<!-- Botão Adicionar -->
<div class="d-flex justify-content-end mt-3">
  <button class="btn btn-success" (click)="adicionar()">Adicionar Categoria</button>
</div>
