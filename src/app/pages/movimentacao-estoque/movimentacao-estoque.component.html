<div class="container mt-4" style="max-width: 500px;">
  <h4 class="mb-3">Movimentação de Estoque</h4>


  <div *ngIf="alert.show"
     class="alert alert-{{alert.type}} alert-dismissible fade show"
     role="alert">

    {{ alert.message }}

    <button type="button"
            class="btn-close"
            (click)="alert.show = false">
    </button>
  </div>


  <form (ngSubmit)="salvar()" #form="ngForm">

    <!-- 🔍 Produto (Autocomplete) -->
    <div class="mb-3 position-relative">
      <label class="form-label">Produto</label>

      <input
        type="text"
        class="form-control"
        placeholder="Digite nome ou código do produto"
        [(ngModel)]="filtroProduto"
        name="produtoBusca"
        (input)="filtrarProdutos()"
        (focus)="mostrarDropdown = true"
        autocomplete="off"
        required
      >

      <!-- ✅ Lista de produtos -->
      <ul
        class="list-group position-absolute w-100 shadow"
        *ngIf="mostrarDropdown && produtosFiltrados.length > 0"
        style="z-index: 1000; max-height: 220px; overflow-y: auto;">

        <li
          class="list-group-item list-group-item-action"
          *ngFor="let produto of produtosFiltrados"
          (click)="selecionarProduto(produto)"
          style="cursor: pointer;">

          <div class="d-flex justify-content-between align-items-center">
            <strong>{{ produto.nome }}</strong>

            <!-- 🔴 Badge estoque baixo -->
            <span
              *ngIf="produto.quantidadeAtual < produto.estoqueMinimo"
              class="badge bg-danger">
              Baixo
            </span>
          </div>

          <small
            [class.text-danger]="produto.quantidadeAtual < produto.estoqueMinimo"
            class="text-muted">

            Código: {{ produto.codigo }} | Estoque: {{ produto.quantidadeAtual }}
          </small>

        </li>
      </ul>

      <!-- ❗ Nenhum produto encontrado -->
      <div
        *ngIf="mostrarDropdown && produtosFiltrados.length === 0"
        class="list-group position-absolute w-100 shadow"
        style="z-index: 1000;">

        <div class="list-group-item text-muted text-center">
          Nenhum produto encontrado
        </div>
      </div>
    </div>

    <!-- 🔢 Quantidade -->
    <div class="mb-3">
      <input
        type="number"
        class="form-control"
        placeholder="Quantidade"
        [(ngModel)]="movimentacao.quantidade"
        name="quantidade"
        required
      >
    </div>

    <!-- 🔄 Tipo -->
    <div class="mb-3">
      <select
        class="form-select"
        [(ngModel)]="movimentacao.tipoMovimentacao"
        name="tipoMovimentacao"
        required>

        <option value="ENTRADA">Entrada</option>
        <option value="SAIDA">Saída</option>
      </select>
    </div>

    <!-- 📝 Motivo -->
    <div class="mb-3">
      <input
        type="text"
        class="form-control"
        placeholder="Motivo (opcional)"
        [(ngModel)]="movimentacao.motivo"
        name="motivo"
      >
    </div>

    <!-- Botão -->
    <button
      type="submit"
      class="btn btn-success w-100"
      [disabled]="form.invalid || !movimentacao.produtoId">

      Salvar Movimentação
    </button>

  </form>
</div>
