<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-1">Dashboard</h4>
      <small class="text-muted">Visão geral do estoque</small>
    </div>
    <div class="text-muted">
      <i class="bi bi-calendar3 me-1"></i>Hoje, 15 de Abril de 2024
    </div>
  </div>

  <!-- Cards -->
  <div class="row g-3 mb-4">
    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Total Produtos</small>
              <h3 class="fw-bold mb-0">10</h3>
            </div>
            <div>
              <i class="bi bi-box-seam text-primary fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>


    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Itens em Estoque</small>
              <h3 class="fw-bold mb-0">80</h3>
            </div>
            <div>
              <i class="bi bi-stack text-success fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>


    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Estoque Baixo</small>
              <h3 class="fw-bold mb-0 text-danger">5</h3>
            </div>
            <div>
              <i class="bi bi-exclamation-triangle text-danger fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>


    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Mov. Hoje</small>
              <h3 class="fw-bold mb-0">3</h3>
            </div>
            <div>
              <i class="bi bi-arrow-left-right text-info fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>


    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Valor Total</small>
              <h5 class="fw-bold mb-0">500</h5>
            </div>
            <div>
              <i class="bi bi-currency-dollar text-warning fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-2 col-md-4 col-sm-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <small class="text-muted d-block mb-1">Categorias</small>
              <h3 class="fw-bold mb-0">8</h3>
            </div>
            <div>
              <i class="bi bi-tags text-secondary fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!--Fim Cards -->

  <div class="row g-3 mb-4">

    <!-- Movimentações por Dia (bar chart CSS) -->
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom-0 pt-3">
          <h6 class="fw-semibold mb-0">Movimentações por Dia</h6>
        </div>
        <div class="card-body">
          <div class="d-flex align-items-end gap-3" style="height: 200px;">
            <div *ngFor="let dia of movPorDia" class="flex-fill text-center">
              <div class="d-flex gap-1 justify-content-center align-items-end" style="height: 180px;">
                <div class="bg-primary rounded-top"
                     [style.height.px]="(dia.entradas / 50) * 160"
                     style="width: 20px; min-height: 4px; transition: height 0.5s;"
                     [title]="'Entradas: ' + dia.entradas">
                </div>
                <div class="bg-danger bg-opacity-75 rounded-top"
                     [style.height.px]="(dia.saidas / 50) * 160"
                     style="width: 20px; min-height: 4px; transition: height 0.5s;"
                     [title]="'Saídas: ' + dia.saidas">
                </div>
              </div>
              <small class="text-muted">{{ dia.dia }}</small>
            </div>
          </div>
          <div class="d-flex gap-3 mt-3 justify-content-center">
            <small><span class="badge bg-primary">&nbsp;</span> Entradas</small>
            <small><span class="badge bg-danger bg-opacity-75">&nbsp;</span> Saídas</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Estoque por Categoria -->
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-white border-bottom-0 pt-3">
          <h6 class="fw-semibold mb-0">Estoque por Categoria</h6>
        </div>
        <div class="card-body">
          <div *ngFor="let cat of estoquePorCategoria" class="mb-3">
            <div class="d-flex justify-content-between mb-1">
              <small class="fw-medium">{{ cat.categoria }}</small>
              <small class="text-muted">{{ cat.quantidade }} un.</small>
            </div>
            <div class="progress" style="height: 8px;">
              <div class="progress-bar"
                   [class.bg-primary]="cat.quantidade > 100"
                   [class.bg-warning]="cat.quantidade > 20 && cat.quantidade <= 100"
                   [class.bg-danger]="cat.quantidade <= 20"
                   [style.width.%]="(cat.quantidade / maxEstoque) * 100"
                   role="progressbar">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
